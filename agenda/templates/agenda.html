<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - TimeSaver</title>

    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="agenda-body">

    <nav class="navbar">
        <h1>Agenda Médica</h1>
        <a href="{{ url_for('views.logout') }}" class="btn-logout">Sair</a>
    </nav>

    <div class="container">
        <h2>Bem-vindo, {{ usuario }}!</h2>
        {% if erro %}
            <div class="alert-error" style="margin-bottom: 20px;">
                {{ erro }}
            </div>
        {% endif %}

        <div class="card">
            <h3>Consultar Agendamentos</h3>
            <p style="color: #6c757d; font-size: 0.9rem; margin-top: 5px; margin-bottom: 15px;">
                Digite o nome do paciente, CPF ou nome do médico para filtrar a lista.
            </p>
            <div class="search-box">
                <input type="text" id="busca" placeholder="Buscar por paciente, CPF ou médico...">
            </div>
        </div>

        <div class="card">
            <div id="tabela-agenda"></div>
        </div>

    </div>

    <script>
        const dados = {{ consultas | tojson }};

        const table = new Tabulator("#tabela-agenda", {
            data: dados,
            layout: "fitColumns",
            placeholder: "Nenhum agendamento disponível.",
            columns: [
                { title: "Data", field: "data_consulta", width: 110 },
                { title: "Horário", field: "hora_consulta", width: 100 },
                { title: "Paciente", field: "nome_paciente" },
                { title: "CPF", field: "cpf_paciente", width: 140 },
                { title: "Médico", field: "nome_medico" },
                { title: "Especialidade", field: "especialidade_medico" },
                { title: "Convênio", field: "convenio" },
                { title: "Status", field: "status", width: 120 },
            ],
        });

        document.getElementById("busca").addEventListener("input", function (e) {
            const valor = e.target.value;
            if (!valor) {
                table.clearFilter();
                return;
            }
            
            table.setFilter([
                [
                    { field: "nome_paciente", type: "like", value: valor },
                    { field: "cpf_paciente", type: "like", value: valor },
                    { field: "nome_medico", type: "like", value: valor },
                ]
            ]);
        });
    </script>
</body>
</html>
